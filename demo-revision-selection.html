<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision Selection Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flash-green {
            animation: flashGreen 0.5s ease;
        }
        @keyframes flashGreen {
            0%, 100% { background-color: transparent; }
            50% { background-color: #d1fae5; }
        }
    </style>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-2xl shadow-lg p-8 mb-6">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Revision Selection Demo</h1>
            <p class="text-gray-600 mb-6">See how auto-save works when you change the revision dropdown</p>

            <!-- Demo Table -->
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-xs uppercase font-bold">
                            <th class="px-6 py-4 text-left">ID</th>
                            <th class="px-6 py-4 text-left">Name</th>
                            <th class="px-6 py-4 text-left">Phone</th>
                            <th class="px-6 py-4 text-left">
                                Revision 
                                <span class="text-emerald-600 font-normal ml-1">(Auto-saves)</span>
                            </th>
                            <th class="px-6 py-4 text-left">Status</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="demoTable" class="divide-y divide-gray-100">
                        <!-- Rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="bg-gray-900 rounded-2xl shadow-lg p-6">
            <h2 class="text-xl font-bold text-white mb-4">Activity Log</h2>
            <div id="activityLog" class="space-y-2 text-sm font-mono text-gray-300 max-h-64 overflow-y-auto">
                <div class="text-gray-500">Waiting for activity...</div>
            </div>
        </div>
    </div>

    <script>
        const demoData = [
            { id: '101', name: 'John Smith', phone: '+1-555-0101', revision: '0', status: 'Pending' },
            { id: '102', name: 'Jane Doe', phone: '+1-555-0102', revision: '0', status: 'Pending' },
            { id: '103', name: 'Mike Johnson', phone: '+1-555-0103', revision: '0', status: 'Pending' }
        ];

        function renderTable() {
            const tbody = document.getElementById('demoTable');
            tbody.innerHTML = '';

            demoData.forEach((record, index) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition-colors';
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm font-semibold text-gray-900">${record.id}</td>
                    <td class="px-6 py-4 text-sm text-gray-700">${record.name}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${record.phone}</td>
                    <td class="px-6 py-4">
                        <select 
                            id="revision-${index}"
                            class="px-3 py-1.5 rounded-lg bg-gray-50 border border-gray-200 text-gray-900 text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer"
                            onchange="handleRevisionChange(${index}, this.value)"
                        >
                            <option value="0" ${record.revision === '0' ? 'selected' : ''}>Revision 0</option>
                            <option value="1" ${record.revision === '1' ? 'selected' : ''}>Revision 1</option>
                            <option value="2" ${record.revision === '2' ? 'selected' : ''}>Revision 2</option>
                            <option value="A" ${record.revision === 'A' ? 'selected' : ''}>Revision A</option>
                            <option value="B" ${record.revision === 'B' ? 'selected' : ''}>Revision B</option>
                            <option value="C" ${record.revision === 'C' ? 'selected' : ''}>Revision C</option>
                        </select>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${getStatusClass(record.status)}">
                            ${record.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button 
                            onclick="handleAutomate(${index})"
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-all"
                        >
                            Automate
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getStatusClass(status) {
            return status === 'Automated' 
                ? 'bg-emerald-100 text-emerald-700' 
                : 'bg-amber-100 text-amber-700';
        }

        function handleRevisionChange(index, revision) {
            // Update data
            demoData[index].revision = revision;

            // Visual feedback
            const select = document.getElementById(`revision-${index}`);
            select.classList.add('flash-green');
            setTimeout(() => {
                select.classList.remove('flash-green');
            }, 500);

            // Log activity
            logActivity(`✅ Auto-saved: ${demoData[index].name} → Revision ${revision}`, 'success');
            logActivity(`   Saved to LocalStorage (simulated)`, 'info');
        }

        function handleAutomate(index) {
            // Update status
            demoData[index].status = 'Automated';
            
            // Re-render
            renderTable();

            // Log activity
            logActivity(`🎯 Automated: ${demoData[index].name} (Revision ${demoData[index].revision})`, 'success');
            logActivity(`   Status changed to "Automated"`, 'info');
            logActivity(`   Timestamp: ${new Date().toLocaleTimeString()}`, 'info');
        }

        function logActivity(message, type = 'info') {
            const log = document.getElementById('activityLog');
            
            // Remove "waiting" message
            if (log.querySelector('.text-gray-500')) {
                log.innerHTML = '';
            }

            const entry = document.createElement('div');
            entry.className = type === 'success' ? 'text-emerald-400' : 'text-gray-300';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.insertBefore(entry, log.firstChild);

            // Keep only last 20 entries
            while (log.children.length > 20) {
                log.removeChild(log.lastChild);
            }
        }

        // Initial render
        renderTable();
        logActivity('Demo loaded. Try changing a revision dropdown!', 'info');
    </script>
</body>
</html>
