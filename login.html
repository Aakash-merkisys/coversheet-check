<!DOCTYPE html>
<html class="light" lang="en">



<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - Customer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css?v=2.1" />
    <link rel="stylesheet" href="premium-styles.css?v=2.1" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        // Wait for Tailwind to load before configuring
        window.addEventListener('load', function() {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    darkMode: "class",
                    theme: {
                        extend: {
                            colors: {
                                "primary": "#2563eb",
                                "emerald-custom": "#059669",
                                "background-light": "#f8faff",
                                "background-dark": "#0f172a",
                            },
                            fontFamily: {
                                "sans": ["system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Arial", "sans-serif"]
                            },
                        },
                    },
                }
            }
        });
    </script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
        }
        
        .left-panel {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            position: relative;
            overflow: hidden;
        }
        
        .left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 15s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 10%) scale(1.1); }
        }
        
        .user-avatars {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }
            .left-panel {
                min-height: 40vh;
            }
        }
    </style>
</head>

<body class="font-sans bg-slate-50">
    <div class="login-container">
        <!-- Left Panel - Blue -->
        <div class="left-panel w-full md:w-1/2 flex items-center justify-center p-8 md:p-16 text-white relative z-10">
            <div class="max-w-lg space-y-8 animate-fade-in-up">
                <!-- Logo & Title -->
                <div class="flex items-center gap-3">
                    <div class="size-10 bg-white/20 backdrop-blur-sm rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-[28px]">layers</span>
                    </div>
                    <h1 class="text-xl font-bold">Submission Management</h1>
                </div>
                
                <!-- Main Heading -->
                <div class="space-y-4">
                    <h2 class="text-5xl md:text-6xl font-bold leading-tight">
                        Streamline your<br>workflow.
                    </h2>
                    <p class="text-lg text-blue-100 leading-relaxed max-w-md">
                        The all-in-one platform for managing high-volume submissions, approvals, and data analytics with enterprise-grade security.
                    </p>
                </div>
                

            </div>
        </div>
        
        <!-- Right Panel - White -->
        <div class="w-full md:w-1/2 flex items-center justify-center p-8 md:p-16 bg-white">
            <div class="w-full max-w-md space-y-8 animate-fade-in-up">
                <!-- Welcome Header -->
                <div class="space-y-2">
                    <h3 class="text-3xl font-bold text-slate-900">Welcome Back</h3>
                    <p class="text-slate-500">Enter your credentials to access your dashboard</p>
                </div>
                
                <!-- Login Form -->
                <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
                    <!-- Email Field -->
                    <div class="space-y-2">
                        <label for="email" class="text-sm font-semibold text-slate-700">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <span class="material-symbols-outlined text-[20px]">mail</span>
                            </div>
                            <input type="email" id="email" required
                                class="w-full pl-11 pr-4 py-3 rounded-xl border-2 border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all placeholder:text-slate-400"
                                placeholder="name@company.com" />
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
                            <a href="forgot-password.html" class="text-sm font-semibold text-primary hover:underline">Forgot Password?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <span class="material-symbols-outlined text-[20px]">lock</span>
                            </div>
                            <input type="password" id="password" required
                                class="w-full pl-11 pr-4 py-3 rounded-xl border-2 border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all placeholder:text-slate-400"
                                placeholder="••••••••" />
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="remember" class="size-4 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer" />
                        <label for="remember" class="text-sm text-slate-600 cursor-pointer select-none">Remember this device</label>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="w-full bg-primary text-white py-3.5 rounded-xl font-bold text-base transition-all hover:bg-blue-700 active:scale-[0.98] shadow-lg shadow-primary/20">
                        Sign in 
                    </button>
                </form>


            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            // Get email input value
            const emailInput = document.getElementById('email');
            const email = emailInput.value;
            
            // Extract username from email (part before @)
            const username = email.split('@')[0];
            
            // Store username in localStorage
            localStorage.setItem('loggedInUser', username);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('loginTimestamp', new Date().toISOString());
            
            // Redirect to dashboard
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
